<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Congrats</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="page">
    <section class="card">
      <div class="topbar">
        <p class="chip" id="chipText">RETRO NEON MODE</p>
        <button
          type="button"
          id="a11yToggle"
          class="a11y-toggle"
          aria-pressed="false"
          aria-label="Включить режим для слабовидящих"
        >
          A11Y
        </button>
      </div>

      <h1 id="titleText">С днём рождения, Стас!</h1>
      <p class="lead" id="leadText">Оставь своё поздравление. С одного IP можно отправить только один раз.</p>

      <form id="form" class="form" novalidate>
        <label for="name" id="nameLabel">Ваше имя</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Например, Алекс"
          minlength="2"
          maxlength="40"
          required
        >

        <label for="message" id="messageLabel">Поздравление</label>
        <textarea
          id="message"
          name="message"
          placeholder="Напиши тёплое поздравление (5-500 символов)"
          minlength="5"
          maxlength="500"
          required
        ></textarea>

        <button type="submit" id="submitBtn">Отправить</button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
